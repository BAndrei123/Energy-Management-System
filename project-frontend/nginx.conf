server {
    # Listen on port 80
    listen 80;

    # Serve files from the Nginx HTML directory
    location / {
        root   /usr/share/nginx/html;
        try_files $uri /index.html;  # Single-page application routing
    }

    # Optional: Add caching headers for static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|ico|woff|woff2|ttf|eot)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        root   /usr/share/nginx/html;
        try_files $uri /index.html;
    }

    error_page 404 /index.html;  # Fallback to index.html for 404s (SPA routing)
}
